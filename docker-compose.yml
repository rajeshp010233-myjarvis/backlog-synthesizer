version: "3.9"

# Redis password is set via the REDIS_PASSWORD env var.
# Set it in .env (never commit that file) or via a secrets manager.

services:
  chromadb:
    image: chromadb/chroma:0.5.23
    # No public port — only the backend service can reach ChromaDB
    expose:
      - "8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # No public port — only backend/mcp-server can reach Redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - chromadb
      - redis
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    restart: unless-stopped

  mcp-server:
    build: ./backend
    command: ["python", "-m", "mcp_server.server"]
    ports:
      - "8002:8002"
    env_file: ./backend/.env
    depends_on:
      - redis
      - backend
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BACKEND_URL: http://backend:8000
      MCP_PORT: "8002"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
  redis_data:
