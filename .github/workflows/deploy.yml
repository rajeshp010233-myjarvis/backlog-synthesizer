name: Deploy — AWS Free Tier (EC2 + ECR)

# ─── AWS Free Tier architecture ───────────────────────────────────────────────
# All infrastructure is managed by Terraform in infra/terraform/
# Run `terraform apply` once to create resources, then set the GitHub Secrets
# printed by `terraform output github_secrets_summary`.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       — from: terraform output github_actions_access_key_id
#   AWS_SECRET_ACCESS_KEY   — from: terraform output -raw github_actions_secret_access_key
#   AWS_REGION              — e.g. us-east-1
#   AWS_ACCOUNT_ID          — from: terraform output aws_account_id
#   EC2_INSTANCE_ID         — from: terraform output instance_id
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

env:
  AWS_REGION:    ${{ secrets.AWS_REGION }}
  ACCOUNT_ID:    ${{ secrets.AWS_ACCOUNT_ID }}
  IMAGE_TAG:     ${{ github.sha }}
  BACKEND_REPO:  backlog-synthesizer-backend
  FRONTEND_REPO: backlog-synthesizer-frontend
  MCP_REPO:      backlog-synthesizer-mcp-server

jobs:
  # ── 1. Tests (gate — must pass before any AWS action) ───────────────────────
  test:
    name: Tests (must pass before deploy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: pytest
        env:
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          GOOGLE_API_KEY: ""
          REDIS_URL: "redis://localhost:6379"
          APP_API_KEY: ""
        run: pytest --ignore=tests/test_mcp_server.py

  # ── 2. Build & push images to ECR ───────────────────────────────────────────
  build-and-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push mcp-server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.MCP_REPO }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.MCP_REPO }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Deploy to EC2 via SSM Run Command (no open SSH port needed) ───────────
  deploy-ec2:
    name: Deploy to EC2 (free tier t2.micro)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSM Run Command
        run: |
          ECR_REGISTRY="${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.IMAGE_TAG }}" \
            --parameters "commands=[
              'set -e',
              'cd /opt/backlog-synthesizer',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REGISTRY}',
              'export ECR_REGISTRY=${ECR_REGISTRY}',
              'export IMAGE_TAG=${{ env.IMAGE_TAG }}',
              'docker compose pull',
              'docker compose up -d --remove-orphans',
              'docker image prune -f',
              'echo Deploy complete ${{ env.IMAGE_TAG }}'
            ]" \
            --output text \
            --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out."
          exit 1

  # ── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [test, build-and-push, deploy-ec2]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: echo "::error::Pipeline failed at ${{ github.sha }} by ${{ github.actor }}"
