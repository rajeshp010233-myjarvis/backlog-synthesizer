name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}

# ─── Required GitHub Secrets ──────────────────────────────────────────────────
# AWS_ACCOUNT_ID          – 12-digit AWS account number
# AWS_REGION              – e.g. us-east-1
# AWS_ACCESS_KEY_ID       – IAM user with ECR + ECS permissions
# AWS_SECRET_ACCESS_KEY
# ECS_CLUSTER             – name of your ECS cluster
#
# AZURE_CREDENTIALS       – JSON output of: az ad sp create-for-rbac --sdk-auth
# AZURE_RESOURCE_GROUP    – resource group containing Container Apps
# ACR_LOGIN_SERVER        – e.g. myregistry.azurecr.io
# ACR_USERNAME
# ACR_PASSWORD
# AZURE_CONTAINER_APPS_ENV – Container Apps environment name
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. BUILD & PUSH to both registries ──────────────────────────────────────
  build-and-push:
    name: Build images & push to ECR + ACR
    runs-on: ubuntu-latest
    outputs:
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # ── AWS ECR login ──
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Azure ACR login ──
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Backend ──
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-backend:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-backend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-frontend:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-frontend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── MCP Server (same Dockerfile as backend, different CMD at runtime) ──
      - name: Build & push mcp-server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-mcp-server:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-mcp-server:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-mcp-server:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2a. DEPLOY to AWS ECS Fargate ───────────────────────────────────────────
  deploy-aws:
    name: Deploy to AWS ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production-aws
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Backend service ──
      - name: Render backend task definition
        id: task-def-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/aws/task-definitions/backend.json
          container-name:  backend
          image: ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-backend:${{ env.IMAGE_TAG }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:  ${{ steps.task-def-backend.outputs.task-definition }}
          service:          backlog-synthesizer-backend
          cluster:          ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── Frontend service ──
      - name: Render frontend task definition
        id: task-def-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/aws/task-definitions/frontend.json
          container-name:  frontend
          image: ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-frontend:${{ env.IMAGE_TAG }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:  ${{ steps.task-def-frontend.outputs.task-definition }}
          service:          backlog-synthesizer-frontend
          cluster:          ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── MCP Server service ──
      - name: Render mcp-server task definition
        id: task-def-mcp
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/aws/task-definitions/mcp-server.json
          container-name:  mcp-server
          image: ${{ steps.login-ecr.outputs.registry }}/backlog-synthesizer-mcp-server:${{ env.IMAGE_TAG }}

      - name: Deploy mcp-server to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:  ${{ steps.task-def-mcp.outputs.task-definition }}
          service:          backlog-synthesizer-mcp-server
          cluster:          ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── 2b. DEPLOY to Azure Container Apps ──────────────────────────────────────
  deploy-azure:
    name: Deploy to Azure Container Apps
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production-azure
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Backend ──
      - name: Deploy backend container app
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup:         ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName:      backlog-synthesizer-backend
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINER_APPS_ENV }}
          imageToDeploy:         ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-backend:${{ env.IMAGE_TAG }}
          registryUrl:           ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername:      ${{ secrets.ACR_USERNAME }}
          registryPassword:      ${{ secrets.ACR_PASSWORD }}
          targetPort:            8000
          ingress:               external
          environmentVariables: >
            CHROMA_HOST=chromadb
            CHROMA_PORT=8000
            USE_MOCK_BACKLOG=false
            ANTHROPIC_API_KEY=secretref:anthropic-api-key
            REDIS_URL=secretref:redis-url
            JIRA_BASE_URL=secretref:jira-base-url
            JIRA_TOKEN=secretref:jira-token
            GITHUB_TOKEN=secretref:github-token

      # ── Frontend ──
      - name: Deploy frontend container app
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup:         ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName:      backlog-synthesizer-frontend
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINER_APPS_ENV }}
          imageToDeploy:         ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-frontend:${{ env.IMAGE_TAG }}
          registryUrl:           ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername:      ${{ secrets.ACR_USERNAME }}
          registryPassword:      ${{ secrets.ACR_PASSWORD }}
          targetPort:            80
          ingress:               external

      # ── MCP Server ──
      - name: Deploy mcp-server container app
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup:         ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName:      backlog-synthesizer-mcp-server
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINER_APPS_ENV }}
          imageToDeploy:         ${{ secrets.ACR_LOGIN_SERVER }}/backlog-synthesizer-mcp-server:${{ env.IMAGE_TAG }}
          registryUrl:           ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername:      ${{ secrets.ACR_USERNAME }}
          registryPassword:      ${{ secrets.ACR_PASSWORD }}
          targetPort:            8002
          ingress:               external
          environmentVariables: >
            MCP_PORT=8002
            REDIS_URL=secretref:redis-url
            JIRA_TOKEN=secretref:jira-token
            GITHUB_TOKEN=secretref:github-token

  # ── 3. Notify on failure ─────────────────────────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    needs: [deploy-aws, deploy-azure]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Print failure summary
        run: |
          echo "::error::Deployment failed. Check the deploy-aws and deploy-azure job logs."
          echo "Commit: ${{ github.sha }}"
          echo "Actor:  ${{ github.actor }}"
