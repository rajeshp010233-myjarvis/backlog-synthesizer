name: Deploy — AWS Free Tier (EC2 + ECR)

# ─── AWS Free Tier architecture ───────────────────────────────────────────────
# EC2 t2.micro (750 h/month free) — runs all services via docker-compose
# ECR             — stores Docker images (500 MB free storage)
# Elastic IP      — static public IP so your URL never changes
# CloudWatch Logs — basic log ingestion (5 GB free)
#
# ─── Required GitHub Secrets ──────────────────────────────────────────────────
# AWS_ACCESS_KEY_ID       — IAM user key (needs ECR + EC2 SSM permissions)
# AWS_SECRET_ACCESS_KEY
# AWS_REGION              — e.g. us-east-1
# AWS_ACCOUNT_ID          — 12-digit account number
# EC2_INSTANCE_ID         — i-0abc1234def567890
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  ACCOUNT_ID:   ${{ secrets.AWS_ACCOUNT_ID }}
  IMAGE_TAG:    ${{ github.sha }}
  # ECR repo names (created once manually or via bootstrap script)
  BACKEND_REPO:  backlog-synthesizer-backend
  FRONTEND_REPO: backlog-synthesizer-frontend
  MCP_REPO:      backlog-synthesizer-mcp-server

jobs:
  # ── 1. Run tests first (gate on green) ──────────────────────────────────────
  test:
    name: Tests (must pass before deploy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: pytest
        env:
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          GOOGLE_API_KEY: ""
          REDIS_URL: "redis://localhost:6379"
          APP_API_KEY: ""
        run: pytest --ignore=tests/test_mcp_server.py

  # ── 2. Build & push images to ECR ───────────────────────────────────────────
  build-and-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for repo in $BACKEND_REPO $FRONTEND_REPO $MCP_REPO; do
            aws ecr describe-repositories --repository-names "$repo" 2>/dev/null || \
            aws ecr create-repository --repository-name "$repo" \
              --image-scanning-configuration scanOnPush=true
          done

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push mcp-server
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.MCP_REPO }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.MCP_REPO }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Deploy to EC2 via SSM (no open SSH port needed) ──────────────────────
  deploy-ec2:
    name: Deploy to EC2 (free tier t2.micro)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSM Run Command
        run: |
          ECR_REGISTRY="${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backlog-synthesizer ${{ env.IMAGE_TAG }}" \
            --parameters 'commands=[
              "set -e",
              "cd /opt/backlog-synthesizer",

              "# Authenticate Docker with ECR",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin '"$ECR_REGISTRY"'",

              "# Pull latest images",
              "docker pull '"$ECR_REGISTRY"'/${{ env.BACKEND_REPO }}:latest",
              "docker pull '"$ECR_REGISTRY"'/${{ env.FRONTEND_REPO }}:latest",
              "docker pull '"$ECR_REGISTRY"'/${{ env.MCP_REPO }}:latest",

              "# Update compose to use ECR images",
              "export ECR_REGISTRY='"$ECR_REGISTRY"'",
              "export IMAGE_TAG=latest",

              "# Rolling restart — pull new images, recreate containers",
              "docker compose up -d --no-build",

              "# Remove dangling images to save disk space",
              "docker image prune -f",

              "echo Deploy complete: ${{ env.IMAGE_TAG }}"
            ]' \
            --output text \
            --query "Command.CommandId" > /tmp/command_id.txt

          COMMAND_ID=$(cat /tmp/command_id.txt)
          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete (up to 5 minutes)
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for deploy."
          exit 1

  # ── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [test, build-and-push, deploy-ec2]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "::error::Pipeline failed at commit ${{ github.sha }} by ${{ github.actor }}"
